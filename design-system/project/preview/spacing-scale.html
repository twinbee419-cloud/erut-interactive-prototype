<!doctype html><html><head><meta charset="utf-8"><title>Spacing scale</title><link rel="stylesheet" href="_card.css"></head>
<body class="card">
<div style="display:grid; grid-template-columns: repeat(12, 1fr); gap:8px; align-items: end;">
  <!-- Each cell: a vertical block whose height encodes the px value (px capped). -->
  <div class="col" style="align-items:center"><div style="width:14px; height:4px; background:#2285EF"></div><div class="tok">1</div><div class="val">4</div></div>
  <div class="col" style="align-items:center"><div style="width:14px; height:8px; background:#2285EF"></div><div class="tok">2</div><div class="val">8</div></div>
  <div class="col" style="align-items:center"><div style="width:14px; height:12px; background:#2285EF"></div><div class="tok">3</div><div class="val">12</div></div>
  <div class="col" style="align-items:center"><div style="width:14px; height:16px; background:#2285EF"></div><div class="tok">4</div><div class="val">16</div></div>
  <div class="col" style="align-items:center"><div style="width:14px; height:20px; background:#2285EF"></div><div class="tok">5</div><div class="val">20</div></div>
  <div class="col" style="align-items:center"><div style="width:14px; height:24px; background:#2285EF"></div><div class="tok">6</div><div class="val">24</div></div>
  <div class="col" style="align-items:center"><div style="width:14px; height:32px; background:#2285EF"></div><div class="tok">8</div><div class="val">32</div></div>
  <div class="col" style="align-items:center"><div style="width:14px; height:40px; background:#2285EF"></div><div class="tok">10</div><div class="val">40</div></div>
  <div class="col" style="align-items:center"><div style="width:14px; height:48px; background:#2285EF"></div><div class="tok">12</div><div class="val">48</div></div>
  <div class="col" style="align-items:center"><div style="width:14px; height:64px; background:#2285EF"></div><div class="tok">16</div><div class="val">64</div></div>
  <div class="col" style="align-items:center"><div style="width:14px; height:80px; background:#2285EF"></div><div class="tok">20</div><div class="val">80</div></div>
  <div class="col" style="align-items:center"><div style="width:14px; height:96px; background:#2285EF"></div><div class="tok">24</div><div class="val">96</div></div>
</div>
<div style="margin-top:14px; font:700 12px/1.4 var(--font-kr); color:var(--content-low); letter-spacing: var(--letterspacing-default)">
  Spacing tokens — 12-step ladder. Used uniformly for padding, gap and margin.
</div>
</body></html>
