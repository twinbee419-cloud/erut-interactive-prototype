<!doctype html><html><head><meta charset="utf-8"><title>Colors — Surface</title><link rel="stylesheet" href="_card.css"></head>
<body class="card">
<div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 14px;">
  <div class="col"><div class="swatch" style="background:#F7F9FC"></div><div class="tok">base</div><div class="val">#F7F9FC</div></div>
  <div class="col"><div class="swatch" style="background:#E0E6F1"></div><div class="tok">strong</div><div class="val">#E0E6F1</div></div>
  <div class="col"><div class="swatch" style="background:#EBEFF6"></div><div class="tok">subtle-1</div><div class="val">#EBEFF6</div></div>
  <div class="col"><div class="swatch" style="background:#F1F5FC"></div><div class="tok">subtle-2</div><div class="val">#F1F5FC</div></div>
  <div class="col"><div class="swatch" style="background:#AEB8CA"></div><div class="tok">disabled</div><div class="val">#AEB8CA</div></div>
</div>
<div style="margin-top:14px; font:700 12px/1.4 var(--font-kr); color:var(--content-low); letter-spacing: var(--letterspacing-default)">
  basic / surface — base is the window canvas, subtle-1 is every toolbar / menu / status bar.
</div>
</body></html>
