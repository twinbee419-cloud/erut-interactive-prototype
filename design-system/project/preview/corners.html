<!doctype html><html><head><meta charset="utf-8"><title>Corners — square only</title><link rel="stylesheet" href="_card.css"></head>
<body class="card">
<div style="display:grid; grid-template-columns: repeat(3,1fr); gap:20px; align-items:end">
  <div class="col" style="align-items:flex-start">
    <div style="width:88px; height:64px; background:#EBEFF6; border:1px solid #A5B2CA"></div>
    <div class="tok">surface · 0</div>
    <div class="val">radius: 0</div>
  </div>
  <div class="col" style="align-items:flex-start">
    <div style="display:flex; align-items:center; gap:6px; padding:6px 8px; background:#F7F9FC; border-radius:100px; box-shadow: var(--tag-shadow-inset)">
      <span style="width:8px; height:8px; border-radius:50%; background:#FF005E"></span>
      <span style="font:700 12px/1 var(--font-kr); color:#0A1C3C; letter-spacing:.02em">MC보드 미연결</span>
    </div>
    <div class="tok" style="margin-top:8px">status pill</div>
    <div class="val">radius: 100px</div>
  </div>
  <div class="col" style="align-items:flex-start">
    <div style="display:flex; align-items:center; gap:8px">
      <span style="width:14px; height:14px; border-radius:50%; background:#18E339"></span>
      <span style="width:8px; height:8px; border-radius:50%; background:#FF005E"></span>
    </div>
    <div class="tok" style="margin-top:8px">LED dot</div>
    <div class="val">radius: 50%</div>
  </div>
</div>
<div style="margin-top:14px; font:700 12px/1.4 var(--font-kr); color:var(--content-low); letter-spacing: var(--letterspacing-default)">
  No radius on UI surfaces (각진 형태). Rounding lives only on pills &amp; LEDs.
</div>
</body></html>
