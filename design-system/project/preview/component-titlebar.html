<!doctype html><html><head><meta charset="utf-8"><title>Title bar</title><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="padding:16px; background: var(--surface-base)">
<style>
  .titlebar{
    height:40px; background:var(--content-medium); color:var(--content-inverse);
    display:flex; align-items:center;
    padding: 0 0 0 16px; gap: 12px; position:relative;
  }
  .titlebar .brand{ width:22px; height:22px; background:var(--content-high); display:inline-flex; align-items:center; justify-content:center; color:var(--content-inverse) }
  .titlebar .title{ flex:1; text-align:center; font:700 16px/1 var(--font-kr); letter-spacing:.02em }
  .titlebar .winbtns{ display:flex; gap:0 }   /* buttons sit flush against each other */
  .winbtn{
    width:46px; height:40px;
    display:inline-flex; align-items:center; justify-content:center;
    color:var(--content-inverse);
    background: transparent;     /* enabled = no fill */
    border: 0;                   /* no border */
    box-shadow: none;            /* no drop-shadow */
    padding: 0;
    cursor: pointer;
  }
  .winbtn:hover{
    background: var(--overlay-low);  /* hover only */
    box-shadow: none;
  }
</style>
<div class="titlebar">
  <span class="brand">
    <svg width="14" height="11" viewBox="0 0 14 11" fill="currentColor"><path d="M 1.8 11 C 0.81 11 0 10.2 0 9.21 L 0 0 L 14 0 L 14 2.2 L 3 2.2 L 3 4.4 L 14 4.4 L 14 6.6 L 3 6.6 L 3 8.8 L 14 8.8 L 14 11 Z"/></svg>
  </span>
  <span class="title">ERUT - Ultrasonic Monitoring System</span>
  <span class="winbtns">
    <button class="winbtn" title="Minimize"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="10" x2="12" y2="10"/></svg></button>
    <button class="winbtn" title="Maximize"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="2.5" width="9" height="9"/></svg></button>
    <button class="winbtn" title="Close"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="3" x2="11" y2="11"/><line x1="11" y1="3" x2="3" y2="11"/></svg></button>
  </span>
</div>
<div style="margin-top:10px; font:700 12px/1.4 var(--font-kr); color:var(--content-low); letter-spacing:.02em">
  40px navy · 3 window buttons share the same enabled state (no fill, no border, no shadow); on hover they pick up <code>overlay/low</code> (<code>rgba(255,255,255,0.10)</code>).
</div>
</body></html>
