<!doctype html><html><head><meta charset="utf-8"><title>Colors — Border</title><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="background: var(--surface-base)">
<div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 20px;">
  <div class="col">
    <div style="width:100%; height:56px; background:#FFFFFF; border:1px solid #697893;"></div>
    <div class="tok">high · button / field</div><div class="val">1px #697893</div>
  </div>
  <div class="col">
    <div style="width:100%; height:56px; background:#FFFFFF; border:1px solid #A5B2CA;"></div>
    <div class="tok">medium · default</div><div class="val">1px #A5B2CA</div>
  </div>
  <div class="col">
    <div style="width:100%; height:56px; background:#FFFFFF; border:1px solid #E0E6F1;"></div>
    <div class="tok">low · divider</div><div class="val">1px #E0E6F1</div>
  </div>
  <div class="col">
    <div style="width:100%; height:56px; background:#FFFFFF; border:1px solid #2285EF;"></div>
    <div class="tok">emphasis · selected</div><div class="val">1px #2285EF</div>
  </div>
</div>
</body></html>
