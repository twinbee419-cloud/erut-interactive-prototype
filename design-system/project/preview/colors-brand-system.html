<!doctype html><html><head><meta charset="utf-8"><title>Colors — Brand & System</title><link rel="stylesheet" href="_card.css"></head>
<body class="card">
<div style="display:grid; grid-template-columns: 1fr 4fr; gap: 24px; align-items: start">
  <div class="col">
    <div class="swatch" style="background:#2285EF; width:88px; height:88px"></div>
    <div class="tok">brand / primary</div>
    <div class="val">#2285EF</div>
    <div style="font:700 11px/1.4 var(--font-kr); color:var(--content-low); margin-top:4px; letter-spacing: var(--letterspacing-default)">
      Used ONLY for emphasis. Never as a large fill.
    </div>
  </div>
  <div>
    <div class="tok" style="margin-bottom:10px">system</div>
    <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 12px;">
      <div class="col"><div class="swatch" style="background:#18E339"></div><div class="tok">success</div><div class="val">#18E339</div></div>
      <div class="col"><div class="swatch" style="background:#FF9200"></div><div class="tok">caution</div><div class="val">#FF9200</div></div>
      <div class="col"><div class="swatch" style="background:#FF005E"></div><div class="tok">error</div><div class="val">#FF005E</div></div>
      <div class="col"><div class="swatch" style="background:#2BAEFF"></div><div class="tok">info</div><div class="val">#2BAEFF</div></div>
      <div class="col"><div class="swatch" style="background:#8C8C8C"></div><div class="tok">disabled</div><div class="val">#8C8C8C</div></div>
    </div>
  </div>
</div>
</body></html>
