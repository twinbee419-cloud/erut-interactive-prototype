<!doctype html><html><head><meta charset="utf-8"><title>Colors — Content</title><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="background: var(--surface-base)">
<div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 14px;">
  <div class="col"><div class="swatch" style="background:#0A1C3C"></div><div class="tok">high</div><div class="val">#0A1C3C</div></div>
  <div class="col"><div class="swatch" style="background:#273A5C"></div><div class="tok">medium</div><div class="val">#273A5C</div></div>
  <div class="col"><div class="swatch" style="background:#6B7C9B"></div><div class="tok">low</div><div class="val">#6B7C9B</div></div>
  <div class="col"><div class="swatch" style="background:#FFFFFF"></div><div class="tok">inverse</div><div class="val">#FFFFFF</div></div>
  <div class="col"><div class="swatch" style="background:#2285EF"></div><div class="tok">emphasis</div><div class="val">#2285EF</div></div>
</div>
<div style="margin-top:14px; font:700 12px/1.4 var(--font-kr); color:var(--content-low); letter-spacing: var(--letterspacing-default)">
  basic / content — applied to text & icons. Inverse for the navy title bar.
</div>
</body></html>
