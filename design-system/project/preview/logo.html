<!doctype html><html><head><meta charset="utf-8"><title>Logo</title><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="padding:16px; background: var(--surface-base)">
<style>
  .lockup{ display:flex; align-items:center; gap:14px; padding:18px 20px; box-sizing:border-box }
  .lockup.dark{ background:var(--content-high); color:var(--content-inverse) }
  .lockup.brand{ background:var(--surface-base); color:var(--brand-primary); border:1px solid var(--border-medium) }
  .lockup.icon{ background:var(--surface-base); border:1px solid var(--border-medium); justify-content:center }
  .lockup .wordmark{ display:inline-flex; align-items:center; line-height:0 }
  .lockup .tag{ font:700 14px/1.2 var(--font-kr); letter-spacing:.02em; color: currentColor; opacity:.85 }
</style>
<div style="display:grid; grid-template-columns: 1fr 1fr 220px; gap:12px">
  <div class="lockup brand">
    <span class="wordmark"><img src="../assets/logo/erut-logo.svg" alt="ERUT" style="height:36px; filter: brightness(0) saturate(100%) invert(42%) sepia(83%) saturate(2200%) hue-rotate(195deg) brightness(100%) contrast(91%)"></span>
    <span class="tag" style="color:var(--content-high)">Ultrasonic Monitoring System</span>
  </div>
  <div class="lockup dark">
    <span class="wordmark"><img src="../assets/logo/erut-logo.svg" alt="ERUT" style="height:28px; filter: brightness(0) invert(1)"></span>
    <span class="tag">Ultrasonic Monitoring System</span>
  </div>
  <div class="lockup icon">
    <img src="../assets/logo/erut-app-icon.png" alt="ERUT app icon" style="width:48px; height:48px; image-rendering: pixelated">
    <span class="tag" style="color:var(--content-low); margin-left:12px">App icon · 48×48</span>
  </div>
</div>
</body></html>
