<!doctype html><html><head><meta charset="utf-8"><title>Status bar</title><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="padding:16px">
<style>
  .sbar{ height:46px; background:#EBEFF6; border:1px solid #A5B2CA; backdrop-filter: blur(100px);
         display:flex; align-items:center; gap:20px; padding: 0 10px }
  .pill{ display:inline-flex; align-items:center; gap:6px; padding:6px 10px; background:#F7F9FC; border-radius:100px;
         box-shadow: inset 2px 2px 4px rgba(36,80,158,0.4); font:700 12px/1 var(--font-kr); color:#0A1C3C; letter-spacing:.02em }
  .led{ position:relative; width:14px; height:14px; border-radius:50% }
  .led.red::before{ content:""; position:absolute; inset:0; border-radius:50%; background: radial-gradient(rgba(255,0,94,0) 0%, rgba(255,0,94,0.26) 54%, rgba(255,0,94,0) 100%) }
  .led.red::after{ content:""; position:absolute; left:4px; top:4px; width:6px; height:6px; border-radius:50%; background:#FF005E }
  /* v17.2: gray LED (측정 정지 — content-low). halo 약하게 (MC/MQTT pill과 동일 형태) */
  .led.gray::before{ content:""; position:absolute; inset:0; border-radius:50%; background: radial-gradient(rgba(107,124,155,0) 0%, rgba(107,124,155,0.20) 54%, rgba(107,124,155,0) 100%) }
  .led.gray::after{ content:""; position:absolute; left:4px; top:4px; width:6px; height:6px; border-radius:50%; background:#6B7C9B }
  .stext{ font:700 12px/1 var(--font-kr); color:#6B7C9B; letter-spacing:.02em }
  .grip{ margin-left:auto; color:#6B7C9B }
</style>
<!-- v17.1: 워딩 정리 — MC보드 미연결 + 측정 정지 + MQTT 미연결 (3 pill) -->
<div class="sbar">
  <span class="pill"><span class="led red"></span>MC보드 미연결</span>
  <span class="pill"><span class="led gray"></span>정지</span>
  <span class="pill"><span class="led red"></span>MQTT 미연결</span>
  <span class="stext">PRF : ---</span>
  <span class="stext">Temp : ---</span>
  <span class="stext grip">v0.0.0.0</span>
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#6B7C9B" stroke-width="1.5">
    <line x1="2" y1="14" x2="14" y2="2"/><line x1="7" y1="14" x2="14" y2="7"/><line x1="12" y1="14" x2="14" y2="12"/>
  </svg>
</div>
<div style="margin-top:10px; font:700 12px/1.4 var(--font-kr); color:var(--content-low); letter-spacing:.02em">
  46px · 3 status pills on left (MC보드/측정/MQTT — v17.1), telemetry mid, version + resize grip on right.
</div>
</body></html>
