<!doctype html><html><head><meta charset="utf-8"><title>Iconography</title><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="padding:16px">
<style>
  .iconcell{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:8px;
             width:72px; border:1px solid #E0E6F1; background:#FFFFFF }
  .iconcell svg{ width:24px; height:24px; color:#0A1C3C }
  .iconcell .lbl{ font:700 11px/1 var(--font-en); color:var(--content-low); letter-spacing:.04em; text-transform:uppercase }
</style>
<div style="display:grid; grid-template-columns: repeat(8, 1fr); gap:8px">
  <div class="iconcell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 4h11l3 3v13H5z"/><path d="M8 4v6h8V4"/><rect x="8" y="13" width="8" height="6"/></svg><span class="lbl">save</span></div>
  <div class="iconcell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="6" width="14" height="12"/><line x1="16" y1="12" x2="20" y2="12"/><line x1="18" y1="10" x2="18" y2="14"/></svg><span class="lbl">add machine</span></div>
  <div class="iconcell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M12 3v2M12 19v2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M3 12h2M19 12h2M5.6 18.4l1.4-1.4M17 7l1.4-1.4"/></svg><span class="lbl">setting</span></div>
  <div class="iconcell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="6,9 12,15 18,9"/></svg><span class="lbl">chev down</span></div>
  <div class="iconcell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="16" height="16"/></svg><span class="lbl">maximize</span></div>
  <div class="iconcell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="lbl">minimize</span></div>
  <div class="iconcell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg><span class="lbl">close</span></div>
  <div class="iconcell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 2 L4 14 H11 L11 22 L20 10 H13 Z"/></svg><span class="lbl">bolt</span></div>
  <div class="iconcell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="16"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg><span class="lbl">calendar</span></div>
  <div class="iconcell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="lbl">add</span></div>
  <div class="iconcell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 11 L6 8 L6 10 L18 10 L18 8 L21 11 L18 14 L18 12 L6 12 L6 14 Z"/><path d="M11 3 L8 6 L10 6 L10 18 L8 18 L11 21 L14 18 L12 18 L12 6 L14 6 Z"/></svg><span class="lbl">move</span></div>
  <div class="iconcell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="6"/><line x1="15" y1="15" x2="20" y2="20"/></svg><span class="lbl">search</span></div>
</div>
<div style="margin-top:12px; font:700 12px/1.4 var(--font-kr); color:var(--content-low); letter-spacing:.02em">
  24×24 mono line · stroke 1.5 · square caps · <code>currentColor</code>. Lucide is the recommended fallback set.
</div>
</body></html>
