<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <title>ERUT — Ultrasonic Monitoring System (Interactive Prototype)</title>
  <link rel="stylesheet" href="colors_and_type.css"/>
  <link rel="stylesheet" href="kit.css"/>
  <style>
    html, body { margin:0; padding:0; background:#1B2237; min-height:100vh; overflow:auto; }
    body { display:flex; align-items:flex-start; justify-content:center; }
    .stage { width:1920px; height:1080px; transform-origin: top center; flex: none; margin: 24px 0; }
  </style>
</head>
<body>

<!-- React + Babel pinned per project conventions -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="Controls.jsx"></script>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>

<div class="stage" id="stage">
  <div id="app"></div>
</div>

<script type="text/babel">
const { useState, useEffect } = React;

// Canonical flow (per ServiceFlow_Analysis SSOT):
// [0] project → [1] main → [1-1] dashboard → [2] device → [11] realtime
//   (장비 추가: [1] → connect → [1] · failed 시 connect 재진입)

// v8.5: [1-1] dashboard 라우트 폐기 (MC보드 자산 중심 모델)
const TITLE_BY_SCREEN = {
  project:   "ERUT - Ultrasonic Monitoring System",
  connect:   "ERUT - Ultrasonic Monitoring System  ·  장비 연결",
  main:      "ERUT - Ultrasonic Monitoring System  ·  SK에너지 울산 #2 라인",
  device:    "ERUT - Ultrasonic Monitoring System  ·  MCuF-001 (장비 상세)",
  gate:      "ERUT - Ultrasonic Monitoring System  ·  CH 04 Gate 설정",
  realtime:  "ERUT - Ultrasonic Monitoring System  ·  MCuF-001 · 실시간 스캔 · 3개 대상 · 세션 #047",
  manage:    "ERUT - Ultrasonic Monitoring System  ·  검사 대상 관리",
  settings:  "ERUT - Ultrasonic Monitoring System  ·  장비 연결 설정",
  // v18.0: report 스크린 라우팅 폐기 — 모달 전환
};

// Screens where the device is "connected" (status bar green LEDs) — v18.0: "report" 제거 / v27: "history" 폐기
const CONNECTED_SCREENS = new Set(["main", "device", "commission", "realtime", "manage", "settings"]);

function App() {
  const [screen, setScreen]                   = useState("project");
  const [selectedTarget, setSelectedTarget]   = useState("PIPE-A-204");
  const [selectedChannel, setSelectedChannel] = useState(null);
  const [pickedProject, setPickedProject]     = useState(null);
  const [showNewProject, setShowNewProject]   = useState(false);
  // v10.0: 환경 설정 모달 — 메뉴바 [설정] + 툴바 gear 공통 진입
  const [showSettings, setShowSettings]       = useState(false);
  // v12.0: F6/툴바 play 측정 시작 차단 다이얼로그 (미교정/만료 채널 존재 시) + 일괄 재교정 모달
  const [showCalibStartDialog, setShowCalibStartDialog] = useState(false);
  const [showRecalibWizard, setShowRecalibWizard]       = useState(false);
  // v16.0: 앱 시작 시 / 상태바 배지 클릭 시 표시되는 교정 만료 임박 알림 다이얼로그
  // 실제 백엔드: 앱 시작 시 calibrationPolicy.startupAlertDialog && imminentChannels.length > 0 이면 자동 true
  const [showCalibAlert, setShowCalibAlert]             = useState(false);

  const [menuOpen, setMenuOpen]     = useState(null);
  const [activeMenu, setActiveMenu] = useState(null);
  const [toolKey, setToolKey]       = useState(null);

  // 측정 상태 (lifted up from RealtimeScan — toolbar에서도 표시)
  const [measureState, setMeasureState] = useState("measuring"); // "stopped" | "measuring" (일시정지 폐기)
  const [elapsed, setElapsed]           = useState(272);          // seconds

  // 보드별 측정 상태 — [1] 카드 + [2] 배너 측정 제어 (공유 state). action: start/stop (일시정지 폐기)
  const [boardStates, setBoardStates] = useState(() => {
    const m = {}; (window.MOCK.devices || []).forEach(d => { m[d.id] = d.state; }); return m;
  });
  const controlBoard = (id, action) => setBoardStates(s => {
    const cur = s[id]; let next = cur;
    if (action === "start" && cur === "idle")                          next = "measuring";
    else if (action === "stop" && cur === "measuring")                 next = "idle";
    return next === cur ? s : { ...s, [id]: next };
  });

  // [4] 장비 연결 설정 진입 시 sub-view 지정용 (예: + 장비 추가 → mc-add)
  const [settingsInitialSubView, setSettingsInitialSubView] = useState(null);
  // settings 화면을 떠날 때 초기 sub-view 리셋 (다음 진입 시 list부터)
  useEffect(() => {
    if (screen !== "settings") setSettingsInitialSubView(null);
  }, [screen]);

  // v14.0: commission 화면 진입 모드 — "new" (탐촉자 추가) / "edit" ([2]에서 이 채널 설정 편집)
  const [commissionMode, setCommissionMode] = useState("new");
  const [recalChannels, setRecalChannels]   = useState([]);  // #2: 일괄 재교정 대상 채널 ([4-3-1] recal 모드)
  useEffect(() => {
    if (screen !== "commission") setCommissionMode("new");
  }, [screen]);

  // v8.5: [6] 검사 대상 관리 진입 모드 (edit | new) — DeviceDetail "+ 검사 대상 추가" → new
  const [manageInitialMode, setManageInitialMode] = useState("edit");
  useEffect(() => {
    if (screen !== "manage") setManageInitialMode("edit");
  }, [screen]);

  // v18.0: 보고서 출력 모달 — [2] DeviceDetail 채널 패널 "보고서 출력" / [7] InspectionHistory "보고서 출력" / [파일] 메뉴
  // v18.1: targetId → deviceId (MC보드 단위 진입)
  const [reportDialog, setReportDialog] = useState(null);   // null | { deviceId, initialChannel }
  const [showDiag, setShowDiag] = useState(false);          // 진단/로그 모달 — toolbar 전역 트리거

  // 토스트 (gear 아이콘 등 미구현 항목 안내용 — 메인 기획 보류)
  const [toast, setToast] = useState(null);
  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 3000);
    return () => clearTimeout(t);
  }, [toast]);

  // v9.21 (NDT 1.5): 전역 Mock timer — 모든 화면에 "마지막 저장 N초 전" 표시
  // 실제 백엔드 사양: dev_handoff/Session_Autosave_Spec_v1.0.md
  const [lastSaveSec, setLastSaveSec] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setLastSaveSec(s => (s + 1) >= 30 ? 0 : s + 1), 1000);
    return () => clearInterval(t);
  }, []);
  const fmtSave = (s) => s < 60 ? `마지막 저장 ${s}초 전` : `마지막 저장 ${Math.floor(s/60)}분 전`;

  // v9.20: 앱 시작 시 미완료 세션 복구 다이얼로그 — mock (첫 진입 시 1회)
  const [showRecovery, setShowRecovery] = useState(true);

  const deviceConnected = CONNECTED_SCREENS.has(screen);
  const mqttConnected   = CONNECTED_SCREENS.has(screen);

  function closeMenus() { setMenuOpen(null); setActiveMenu(null); }
  function goto(s) { closeMenus(); setScreen(s); }
  // toolbar 내비게이션 — 이전(back) + breadcrumb(우측 끝)
  const BACK_TO = { main: "project", device: "main", realtime: "device", commission: "device", settings: "main", manage: "main" };
  const goBack = () => { const t = BACK_TO[screen]; if (t) goto(t); };
  const BREADCRUMB = {
    project:    [{ label: "프로젝트 선택", current: true }],
    main:       [{ label: "프로젝트 (" + (pickedProject?.name || "—") + ")" }, { label: "메인", current: true }],
    device:     [{ label: "메인" }, { label: "장비 상세 (MCuF-001)", current: true }],
    realtime:   [{ label: "메인" }, { label: "장비 상세" }, { label: "실시간 스캔 · 세션 #047", current: true }],
    commission: [{ label: "메인" }, { label: "장비 상세" }, { label: "채널 설정", current: true }],
    settings:   [{ label: "메인" }, { label: "장비 연결 설정", current: true }],
    manage:     [{ label: "메인" }, { label: "검사 대상 관리", current: true }],
  };

  const fileMenu = [
    // 프로젝트 저장 — [0]에서 비활성, [1]부터 활성 (구 '다른 이름으로 저장'). 저장은 30초 자동 + 페이지 내 명시 버튼 병행
    { label: "프로젝트 저장", shortcut: "Ctrl+Shift+S", disabled: screen === "project" },
    { divider: true },
    // v18.0: 보고서 출력은 toolbar로 일원화 — 파일 메뉴 항목 삭제(중복). Ctrl+P 단축키는 유지.
    { label: "종료", shortcut: "Alt+F4" },
  ];
  const deviceMenu = [
    // v9.26: '+ 장비 추가' 메뉴바 진입 — [1] '+장비 추가' 버튼과 동일하게 mc-add 모드로 직접 진입
    { label: "+ 장비 추가",     onClick: () => { setSettingsInitialSubView("mc-add"); goto("settings"); } },
    { label: "장비 연결 설정",  onClick: () => goto("settings") },
  ];

  // 툴바: 홈 / 보고서 / 진단. 보고서=장비 컨텍스트 전용. 진단=장비 컨텍스트 + [1] 메인(전체 보드 로그). 이전·알림·breadcrumb은 Toolbar 별도 슬롯.
  const hasDevice = ["device", "realtime", "commission"].includes(screen);
  const tools = [
    { key: "home",   label: "홈 (프로젝트 선택)", icon: <window.EIcon.Home/> },
    { key: "report", label: "보고서 출력", icon: <window.EIcon.Report/>, disabled: !hasDevice },
    { key: "diag",   label: "진단 / 로그", icon: <window.EIcon.Diag/>,   disabled: !(hasDevice || screen === "main") },
  ];

  // v8.5: [1-1] 대시보드 폐기. v14.0: [3] Gate 설정 폐기 → [4-3-1] commission 통합
  const navItems = [
    { id: "project",   label: "[0] 프로젝트" },
    { id: "main",      label: "[1] 메인" },
    { id: "device",    label: "[2] 장비 상세" },
    { id: "commission",label: "[4-3-1] 채널 설정" },
    { id: "settings",  label: "[4] 장비 연결 설정" },
    { id: "manage",    label: "[6] 검사 대상 관리" },
    { id: "realtime",  label: "[11] 실시간" },
  ];

  // v12.0: 측정 시작 시 미교정/만료 채널 차단 다이얼로그 — 안전 보증 default
  const tryStartMeasurement = () => {
    const needsCalib = (window.MOCK && window.MOCK.needsCalibrationChannels) || [];
    if (needsCalib.length > 0 && screen !== "realtime") {
      setShowCalibStartDialog(true);
      return;
    }
    setMeasureState("measuring");
    if (screen !== "realtime") { setSelectedChannel(null); goto("realtime"); }
  };

  // ===== Keyboard =====
  useEffect(() => {
    const onKey = (e) => {
      const tag = (e.target && e.target.tagName) || "";
      if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
      if (e.key === "Escape") { closeMenus(); setShowNewProject(false); setShowCalibStartDialog(false); return; }
      // v12.0: F6 측정 시작 — 교정 미통과 채널 있으면 차단 다이얼로그
      if (e.key === "F6") { e.preventDefault(); tryStartMeasurement(); }
      // v18.0: Ctrl+P → 보고서 출력 모달 (screen 라우팅 폐기)
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "p") { e.preventDefault(); setReportDialog({ deviceId: "MCuF-001", initialChannel: null }); }
      if (screen === "realtime") {
        // F7 측정 중지 시 [2] 장비 상세로 복귀 (일시정지 폐기 — Space 핸들러 제거 / v27: [7] 검사 이력 폐기)
        if (e.key === "F7") { e.preventDefault(); setMeasureState("stopped"); goto("device"); }
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [screen]);

  // 측정 중일 때만 경과 시간 카운트업
  useEffect(() => {
    if (measureState !== "measuring") return;
    const t = setInterval(() => setElapsed(e => e + 1), 1000);
    return () => clearInterval(t);
  }, [measureState]);

  // 시간 포맷터 + 잔여 시간
  const fmtTime = (sec) => {
    const m = Math.floor(sec / 60).toString().padStart(2, "0");
    const s = (sec % 60).toString().padStart(2, "0");
    return m + ":" + s;
  };
  const remaining = Math.max(0, 600 - elapsed); // 10분 기준 세션

  // v9.22 (NDT 1.5): realtime만 "마지막 저장 N초 전" 표시. 다른 화면은 단축키 hint
  let toolbarHint;
  if (screen === "realtime") {
    const c = measureState === "measuring" ? "var(--system-error)" : "var(--content-low)";
    toolbarHint = (
      <span className="erut-tb-hint" style={{ color: c, display: "inline-flex", alignItems: "center", gap: 8 }}>
        <span style={{
          display: "inline-block", width: 8, height: 8, borderRadius: "50%", background: c,
          ...(measureState === "measuring" ? { animation: "erut-sensor-breathe 1.4s ease-in-out infinite", transformOrigin: "center" } : {})
        }}/>
        {measureState === "measuring" && <span>측정 중 · {fmtTime(elapsed)} 경과 · 잔여 {fmtTime(remaining)}</span>}
        {measureState !== "measuring" && <span>정지</span>}
        <span style={{ font: "400 10px/1 var(--font-kr)", color: "var(--content-low)", paddingLeft: 8, borderLeft: "1px solid var(--border-medium)" }}>{fmtSave(lastSaveSec)}</span>
      </span>
    );
  } else {
    // 측정 외 화면 — 단축키 hint 표시
    toolbarHint = (
      <span className="erut-tb-hint" style={{ font: "400 10px/1 var(--font-kr)", color: "var(--content-low)" }}>F6 시작 · F7 중지</span>
    );
  }

  const handleMenuPick = (label) => {
    // v10.0: 메뉴바 [설정] → 환경 설정 모달 (드롭다운 대신 즉시 모달 진입)
    if (label === "설정") {
      closeMenus();
      setShowSettings(true);
      return;
    }
    setActiveMenu(activeMenu === label ? null : label);
    setMenuOpen(
      label === "파일" ? (menuOpen === "file" ? null : "file")
      : label === "장비" ? (menuOpen === "device" ? null : "device")
      : null
    );
  };

  const handleToolPick = (k) => {
    setToolKey(k);
    if (k === "home")   goto("project");
    if (k === "report") setReportDialog({ deviceId: "MCuF-001", initialChannel: null });
    if (k === "diag")   setShowDiag(true);
  };

  const handleMenuItemClick = (item) => {
    if (item.onClick) item.onClick();
    closeMenus();
  };

  return (
    <div className="erut-window">
      <window.TitleBar title={TITLE_BY_SCREEN[screen] || TITLE_BY_SCREEN.project}/>
      <div style={{ position: "relative" }}>
        <window.MenuBar
          items={["파일","장비","설정","도움말"]}
          active={activeMenu}
          onPick={handleMenuPick}
        />
        {menuOpen === "file" && (
          <div style={{ position: "absolute", left: 10, top: 40, zIndex: 50 }}>
            <window.ContextMenu items={fileMenu.map(i => i.divider ? i : { ...i, onClick: () => handleMenuItemClick(i) })}/>
          </div>
        )}
        {menuOpen === "device" && (
          <div style={{ position: "absolute", left: 60, top: 40, zIndex: 50 }}>
            <window.ContextMenu items={deviceMenu.map(i => i.divider ? i : { ...i, onClick: () => handleMenuItemClick(i) })}/>
          </div>
        )}
      </div>
      <window.Toolbar items={tools} activeKey={toolKey} onPick={handleToolPick}
        onBack={goBack} backDisabled={screen === "project"}
        breadcrumb={<window.Breadcrumb items={BREADCRUMB[screen] || []}/>}
        notificationCenter={
          <window.NotificationCenter
            notifications={deviceConnected ? (window.MOCK.notifications || []) : []}
            onSettings={() => setShowSettings(true)}
            onAction={(n) => { if (n.type === "calib") setShowRecalibWizard(true); }}
            onMarkAllRead={() => {}}
          />
        }
      />
      <div className="erut-window__content" onClick={closeMenus} style={{ position: "relative" }}>
        {screen === "project" && (
          <window.ProjectPicker
            onPick={(pid) => { setPickedProject(pid); goto("main"); }}
            onNew={() => setShowNewProject(true)}
            onLoad={() => {}} /* v8.8: 추후 윈도우 파일 탐색기 연동 예정 — 현재는 no-op */
          />
        )}
        {screen === "connect" && (
          <window.EquipmentConnect onContinue={() => goto("main")}/>
        )}
        {screen === "main" && (
          <window.MainScreen
            boardStates={boardStates}
            onBoardControl={controlBoard}
            onAddDevice={() => { setSettingsInitialSubView("mc-add"); goto("settings"); }}
            onOpenDevice={() => { setSelectedChannel(null); goto("device"); }}
          />
        )}
        {/* v8.5: [1-1] dashboard 라우트 폐기 — MC보드 자산 중심 모델 */}
        {screen === "device" && (
          <window.DeviceDetail
            boardStates={boardStates}
            onBoardControl={controlBoard}
            targetId={selectedTarget}
            focusChannel={selectedChannel}
            onBack={() => goto("main")}
            onStartMeasure={(channel) => { setSelectedChannel(channel); goto("realtime"); }}
            /* v14.0: onOpenGate(=[3] Gate 설정) 폐기 → onEditChannel로 통합. commission(edit 모드)로 진입 */
            onEditChannel={(channel) => { setSelectedChannel(channel); setCommissionMode("edit"); goto("commission"); }}
            onAddTarget={() => { setManageInitialMode("new"); goto("manage"); }}
            onEditTarget={(name) => { setSelectedTarget(name); setManageInitialMode("edit"); goto("manage"); }}
            onAddSensor={() => { setCommissionMode("new"); goto("commission"); }}
            /* #2: 일괄 재교정 → [4-3-1] recal 모드 라우팅 */
            onBatchRecal={(chs) => { setRecalChannels(chs || []); setCommissionMode("recal"); goto("commission"); }}
            /* v18.1: 보고서 출력 — MC보드 단위 진입 + 클릭된 채널 prefill (MC보드 정보 옆 버튼) */
            onOpenReport={(channel) => setReportDialog({ deviceId: "MCuF-001", initialChannel: channel })}
          />
        )}
        {/* v14.0: ChannelCommissioning이 new/edit 두 모드 모두 처리 — [3] GateSetup·CalibrationWizard new 모드 폐기 */}
        {screen === "commission" && (
          <window.ChannelCommissioning
            deviceName="MCuF-001"
            mode={commissionMode}
            prefilledChannel={commissionMode === "edit" ? {
              channel: (selectedChannel || "ch04").replace(/\D/g, ""),
              serial: "PXT-2024-" + (selectedChannel || "ch04").replace(/\D/g, "").padStart(3, "0"),
              target: "PIPE-A-204",
              probeType: "std-5mhz",
              wedge:    { value: 27,   unit: "°"   },
              velocity: { value: 5920, unit: "m/s" },
              zero:     { value: 0.0,  unit: "μs"  },
              gain:     { value: 28,   unit: "dB"  },
              gateA: { active: true, start: 2.5,  width: 8.0,  threshold: 80, mode: "Peak" },
              gateB: { active: true, start: 14.0, width: 10.0, threshold: 60, mode: "ToF"  },
            } : undefined}
            targets={[
              { name: "PIPE-A-204" },
              { name: "TANK-B-101" },
              { name: "VESSEL-C-301" },
            ]}
            recalChannels={recalChannels}
            onBack={() => goto("device")}
            onAddOnly={() => goto("device")}
            onAddAndStart={() => { setSelectedChannel("ch65"); goto("realtime"); }}
            onSave={() => goto("device")}
            onSaveAndMeasure={() => goto("realtime")}
            onRemove={() => goto("device")}
          />
        )}
        {/* v14.0: screen "gate" 라우팅 폐기 — commission(edit 모드)로 통합 */}
        {screen === "manage" && (
          <window.TargetManage
            targetId={selectedTarget}
            initialMode={manageInitialMode}
            onBack={() => goto("main")}
          />
        )}
        {screen === "settings" && (
          <window.EquipmentSettings
            initialMenu="mc"
            initialSubView={settingsInitialSubView}
            onBack={() => goto("main")}
          />
        )}
        {screen === "realtime" && (
          <window.RealtimeScan
            targetId={selectedTarget}
            channel={selectedChannel}
            state={measureState}
            setState={setMeasureState}
            elapsed={elapsed}
            setElapsed={setElapsed}
            onBack={() => goto("device")}
            onStop={() => goto("device")}
          />
        )}
        {/* v18.0: [18] 보고서는 풀스크린 → 모달로 전환. v27: [7] 검사 이력 화면 폐기(라우팅·메뉴·진입 전면 제거) */}

        {/* 새 프로젝트 모달 */}
        {showNewProject && (
          <window.NewProjectModal
            onClose={() => setShowNewProject(false)}
            onCreate={() => { setShowNewProject(false); goto("main"); }}
          />
        )}

        {/* v10.0: 환경 설정 모달 (메뉴바 [설정] + 툴바 gear 공통 진입) */}
        {showSettings && (
          <window.SettingsModal onClose={() => setShowSettings(false)}/>
        )}

        {/* v18.0: 채널 측정 보고서 출력 모달 — [2] 채널 패널 / [7] 보고서 출력 / [파일] 메뉴 공통 진입 */}
        {reportDialog && (
          <window.ReportExportDialog
            deviceId={reportDialog.deviceId}
            initialChannel={reportDialog.initialChannel}
            onClose={() => setReportDialog(null)}
            onExport={(payload) => { console.log("PDF export:", payload); setReportDialog(null); setToast("PDF 출력 완료 (" + payload.channels.length + " 장)"); }}
          />
        )}
        {/* 진단/로그 모달 — toolbar 전역 트리거 (구 [2] DeviceDetail 내부 → App 승격) */}
        {showDiag && <window.DiagnosticsModal projectScope={screen === "main"} onClose={() => setShowDiag(false)}/>}

        {/* v12.0: 측정 시작 차단 다이얼로그 (F6 / 툴바 play 공통) — default 일괄 재교정 */}
        {showCalibStartDialog && (
          <window.CalibrationStartDialog
            uncalibratedIds={window.MOCK.uncalibratedChannels}
            expiredIds={window.MOCK.expiredChannels}
            onClose={() => setShowCalibStartDialog(false)}
            onRecalibrateAll={() => { setShowCalibStartDialog(false); setShowRecalibWizard(true); }}
            onContinueAnyway={() => {
              setShowCalibStartDialog(false);
              setMeasureState("measuring");
              if (screen !== "realtime") { setSelectedChannel(null); goto("realtime"); }
            }}
          />
        )}

        {/* v12.0: 일괄 재교정 마법사 — 차단 다이얼로그에서 '일괄 재교정' 선택 시 진입 */}
        {showRecalibWizard && (
          <window.CalibrationWizard
            mode="recalibration"
            channelList={window.MOCK.needsCalibrationChannels}
            onClose={() => setShowRecalibWizard(false)}
            onComplete={() => setShowRecalibWizard(false)}
          />
        )}
        {/* v16.0: 교정 만료 임박 알림 다이얼로그 — 앱 시작 시 자동 표시 + 상태바 배지 클릭 시 표시 */}
        {showCalibAlert && (
          <window.CalibrationExpiryAlertDialog
            channels={window.MOCK.imminentChannels}
            onRecalibrateAll={() => { setShowCalibAlert(false); setShowRecalibWizard(true); }}
            onOpenSettings={() => { setShowCalibAlert(false); setShowSettings(true); }}
            onClose={() => setShowCalibAlert(false)}
          />
        )}
      </div>
      {/* v17.1: window.MOCK.devices에서 mcConnected/mcTotal/measuringCount 집계
          - connected = state !== 'offline' (offline 보드는 미연결 카운트)
          - measuring = state === 'measuring'
          deviceConnected=false 시점은 [0] 진입 직전 등 — 0/0 로 처리 (pill 미표시) */}
      {(() => {
        const devices = window.MOCK?.devices || [];
        const mcTotal = deviceConnected ? devices.length : 0;
        const mcConnected = deviceConnected ? devices.filter(d => d.state !== "offline").length : 0;
        const measuringCount = deviceConnected ? devices.filter(d => d.state === "measuring").length : 0;
        return (
          <window.StatusBar
            mcConnected={mcConnected}
            mcTotal={mcTotal}
            measuringCount={measuringCount}
            mqttConnected={mqttConnected}
            prf={deviceConnected ? "2,000 Hz" : "---"}
            temp={deviceConnected ? "23.4 °C" : "---"}
            version={deviceConnected ? "v1.4.2" : "v0.0.0.0"}
          />
        );
      })()}

      {/* Mini prototype navigator */}
      <div className="erut-protonav">
        <div className="erut-protonav__label">화면</div>
        {navItems.map((n) => (
          <button
            key={n.id}
            className={screen === n.id ? "on" : ""}
            onClick={() => { setSelectedChannel(null); goto(n.id); }}
          >{n.label}</button>
        ))}
      </div>

      {/* 토스트 (미구현 항목 안내) — 상단 중앙 · z-index 매우 높음 */}
      {toast && (
        <div style={{
          position: "absolute", left: "50%", top: 140, transform: "translateX(-50%)",
          background: "var(--content-high)", color: "var(--on-primary)",
          padding: "14px 24px",
          font: "700 14px/1.4 var(--font-kr)", letterSpacing: ".02em",
          border: "2px solid var(--content-medium)",
          zIndex: 2000,
          minWidth: 340, textAlign: "center",
          animation: "erut-fade-in 200ms ease-out",
        }}>{toast}</div>
      )}

      {/* v9.20 (NDT 1.5): 앱 시작 시 미완료 세션 복구 다이얼로그 (mock 첫 진입 1회) */}
      {showRecovery && screen === "project" && (
        <window.Modal
          title="이전 세션 복구"
          onClose={() => setShowRecovery(false)}
          footer={(
            <>
              <window.Button variant="subtle" size="sm" onClick={() => setShowRecovery(false)}>취소</window.Button>
              <window.Button variant="default" size="sm" onClick={() => { setShowRecovery(false); setPickedProject({ id: "sk-ulsan", name: "SK에너지 울산 #2 라인" }); setSelectedTarget("PIPE-A-204"); goto("device"); }}>[2] 장비 상세로 이동</window.Button>
              <window.Button variant="emphasis" size="sm" onClick={() => { setShowRecovery(false); setPickedProject({ id: "sk-ulsan", name: "SK에너지 울산 #2 라인" }); setSelectedTarget("PIPE-A-204"); setMeasureState("measuring"); goto("realtime"); }}>[11] 측정 계속</window.Button>
            </>
          )}
        >
          <div style={{ padding: "10px 12px", background: "var(--surface-subtle-2)", border: "1px solid var(--border-low)", borderLeft: "3px solid var(--system-caution)" }}>
            <div style={{ font: "700 13px/1.2 var(--font-kr)", color: "var(--content-high)" }}>이전 세션 #047 데이터 발견</div>
            <div style={{ font: "400 11px/1.4 var(--font-kr)", color: "var(--content-medium)", marginTop: 4 }}>
              SK에너지 울산 #2 라인 · MCuF-001 · PIPE-A-204
            </div>
          </div>
          <div style={{ font: "400 12px/1.5 var(--font-kr)", color: "var(--content-medium)" }}>
            마지막 자동 저장: <strong>2분 12초 전</strong> · 데이터 23 MB · 진행률 약 65%<br/>
            앱이 정상 종료되지 않아 측정 데이터가 임시 저장된 상태입니다. 어떻게 진행하시겠습니까?
          </div>
        </window.Modal>
      )}

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("app"));
root.render(<App/>);

function fit() {
  const stage = document.getElementById("stage");
  if (!stage) return;
  const wAvail = window.innerWidth - 48;
  const scale  = Math.min(1, wAvail / 1920);
  stage.style.transform = "scale(" + scale + ")";
  stage.style.marginBottom = (24 + (1080 * (1 - scale))) + "px";
}
window.addEventListener("resize", fit);
fit();
setTimeout(fit, 200);
</script>
</body>
</html>
